<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bio-Registry</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="registry-container">
      <div class="medical-header">
        <h2>ORGAN INSTALLATION REGISTRY</h2>
        <p class="subtitle">
          Patient Eligibility Check & Protocol Verification System
        </p>
      </div>
      <p class="notice-text">
        <strong>Regulatory Directive:</strong>Due to physiological developments,
        synthetic and bio-engineered organ installations required a minimum
        biological age of 13 years.
      </p>
      <form id="installationForm">
        <div class="input-group">
          <label for="patientName">Patient Name: </label>
        </div>
      </form>
    </div>
  </body>
</html>
